name: Notify Discord Forum on Issues

on:
  schedule:
    # 監視間隔（カスタマイズ可能）。5 分ごと。
    # 10 分にする場合は '*/10 * * * *'、15 分なら '*/15 * * * *'
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      since:
        description: '指定時刻以降を再取得（ISO8601形式。空欄で state.json の last_run を使用）'
        required: false
        default: ''
  push:
    branches: [main, master]
    paths:
      - 'watched-repos.json'
      - 'scripts/discord_forum_notify.py'
      - '.github/workflows/discord-notify.yml'

permissions:
  contents: write

concurrency:
  group: discord-forum-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notification script
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_FORUM_CHANNEL_ID: ${{ secrets.DISCORD_FORUM_CHANNEL_ID }}
          DISCORD_TAG_OPEN: ${{ secrets.DISCORD_TAG_OPEN }}
          DISCORD_TAG_CLOSED: ${{ secrets.DISCORD_TAG_CLOSED }}
          DISCORD_TAG_REOPENED: ${{ secrets.DISCORD_TAG_REOPENED }}
          SINCE_OVERRIDE: ${{ github.event.inputs.since }}
        run: |
          set -euo pipefail
          if [ -n "$SINCE_OVERRIDE" ]; then
            python scripts/discord_forum_notify.py --since "$SINCE_OVERRIDE"
          else
            python scripts/discord_forum_notify.py
          fi

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f state.json ]; then
            git add state.json
            if git diff --cached --quiet; then
              echo "state.json に変更はないためコミットをスキップします"
            else
              git commit -m "chore: update discord notify state [skip ci]"
              git push
            fi
          else
            echo "state.json が存在しません（初回実行時は即座に作成されるはず）"
          fi